<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioSaaS Parent Portal</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f8fb; color: #172033; }
    main { max-width: 760px; margin: 0 auto; padding: 32px 20px; }
    header, section { background: #fff; border: 1px solid #dfe4ee; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    h1 { font-size: 26px; margin: 0 0 8px; }
    button { background: #1f6feb; color: #fff; border: 0; border-radius: 6px; padding: 10px 14px; font-size: 15px; margin-right: 8px; }
    .muted { color: #64748b; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>StudioSaaS Parent Portal</h1>
      <p class="muted">Registration, balance checks, and shared portfolios will mount here.</p>
    </header>
    <section>
      <button>Register</button>
      <button>Check Balance</button>
      <button>View Portfolio</button>
    </section>
  </main>
</body>
</html>
