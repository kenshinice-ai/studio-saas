<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioSaaS Studio Admin</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f8fb; color: #172033; }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 20px; }
    h1 { font-size: 26px; margin: 0 0 22px; }
    .layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
    nav, section, .panel { background: #fff; border: 1px solid #dfe4ee; border-radius: 8px; padding: 18px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .metric { font-size: 26px; font-weight: 700; }
    .muted { color: #64748b; }
  </style>
</head>
<body>
  <main>
    <h1>StudioSaaS Studio Admin</h1>
    <div class="layout">
      <nav>
        <p>Dashboard</p>
        <p class="muted">Students</p>
        <p class="muted">Courses</p>
        <p class="muted">Portfolio</p>
        <p class="muted">Registrations</p>
        <p class="muted">Settings</p>
      </nav>
      <section>
        <div class="grid">
          <div class="panel"><div class="metric">0</div><div class="muted">Today Check-ins</div></div>
          <div class="panel"><div class="metric">0</div><div class="muted">Low Balance</div></div>
          <div class="panel"><div class="metric">0</div><div class="muted">Pending Registrations</div></div>
        </div>
        <div class="panel">Student, credit, portfolio, and registration workflows will mount here.</div>
      </section>
    </div>
  </main>
</body>
</html>
