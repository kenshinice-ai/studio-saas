<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioSaaS Studio Admin</title>
  <style>
    :root { --ink:#172033; --muted:#64748b; --line:#dfe4ee; --blue:#1f6feb; --bg:#f7f8fb; --warn:#b45309; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 1220px; margin: 0 auto; padding: 28px 20px 42px; }
    header { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 20px; }
    h1 { font-size: 28px; margin: 0 0 6px; }
    h2 { font-size: 18px; margin: 0 0 14px; }
    input, button { font: inherit; }
    input { border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; min-width: 220px; }
    button { border: 0; border-radius: 6px; padding: 10px 14px; background: var(--blue); color: #fff; cursor: pointer; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-bottom: 20px; }
    .two { display: grid; grid-template-columns: 1.35fr .85fr; gap: 18px; align-items: start; }
    .panel { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 18px; }
    .metric { font-size: 26px; font-weight: 700; }
    .muted { color: var(--muted); }
    .warn { color: var(--warn); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 11px 10px; border-bottom: 1px solid #edf0f5; vertical-align: top; }
    th { font-size: 13px; color: var(--muted); }
    code { background: #eef2ff; border-radius: 4px; padding: 2px 5px; }
    .error { border-color: #f2b8b5; background: #fff8f7; color: #9f1c12; }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, 1fr); } .two { grid-template-columns: 1fr; } header { display: block; } input { width: 100%; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="studioName">Studio Admin</h1>
        <div id="studioMeta" class="muted">Loading tenant...</div>
      </div>
      <div class="toolbar">
        <input id="tenantSlug" aria-label="Tenant slug" value="lets-paint-local-test">
        <button id="refreshBtn">Refresh</button>
      </div>
    </header>

    <section id="errorBox" class="panel error" hidden></section>

    <section class="grid">
      <div class="panel"><div id="studentsMetric" class="metric">-</div><div class="muted">Students</div></div>
      <div class="panel"><div id="activeMetric" class="metric">-</div><div class="muted">Active</div></div>
      <div class="panel"><div id="lowMetric" class="metric">-</div><div class="muted">Low Balance</div></div>
      <div class="panel"><div id="pendingMetric" class="metric">-</div><div class="muted">Pending</div></div>
      <div class="panel"><div id="portfolioMetric" class="metric">-</div><div class="muted">Portfolio</div></div>
    </section>

    <div class="two">
      <section class="panel">
        <h2>Students</h2>
        <table>
          <thead><tr><th>Name</th><th>Status</th><th>Balance</th><th>Contact</th></tr></thead>
          <tbody id="studentsBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Courses</h2>
        <table>
          <thead><tr><th>Name</th><th>Unit</th><th>Default Debit</th></tr></thead>
          <tbody id="coursesBody"></tbody>
        </table>
      </section>
    </div>

    <div class="two">
      <section class="panel">
        <h2>Packages</h2>
        <table>
          <thead><tr><th>Name</th><th>Credits</th><th>Price</th></tr></thead>
          <tbody id="packagesBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Registrations</h2>
        <table>
          <thead><tr><th>Name</th><th>Status</th><th>Contact</th></tr></thead>
          <tbody id="registrationsBody"></tbody>
        </table>
      </section>
    </div>

    <section class="panel">
      <h2>Portfolio</h2>
      <table>
        <thead><tr><th>Student</th><th>Title</th><th>Visibility</th><th>Asset</th></tr></thead>
        <tbody id="portfolioBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const text = (value) => value === null || value === undefined || value === '' ? '-' : value;
    const money = (cents) => `AUD ${(Number(cents || 0) / 100).toFixed(2)}`;
    async function get(path) {
      const slug = $('tenantSlug').value.trim();
      const res = await fetch(`/v1${path}`, { headers: { 'X-Tenant-Slug': slug } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.error || `${res.status} ${path}`);
      return data;
    }
    function row(cells) { return `<tr>${cells.map((c) => `<td>${c}</td>`).join('')}</tr>`; }
    async function refresh() {
      $('errorBox').hidden = true;
      localStorage.setItem('studiosaas_tenant_slug', $('tenantSlug').value.trim());
      try {
        const [tenant, dashboard, students, courses, packages, registrations, portfolio] = await Promise.all([
          get('/tenant'), get('/dashboard'), get('/students'), get('/courses'), get('/packages'), get('/registrations'), get('/portfolio')
        ]);
        $('studioName').textContent = tenant.tenant.name;
        $('studioMeta').innerHTML = `<code>${tenant.tenant.slug}</code> · ${tenant.tenant.status} · ${tenant.tenant.plan_code}`;
        $('studentsMetric').textContent = dashboard.dashboard.students;
        $('activeMetric').textContent = dashboard.dashboard.active_students;
        $('lowMetric').textContent = dashboard.dashboard.low_balance;
        $('pendingMetric').textContent = dashboard.dashboard.pending_registrations;
        $('portfolioMetric').textContent = dashboard.dashboard.portfolio_items;
        $('studentsBody').innerHTML = students.students.map((s) => row([
          `<strong>${text(s.display_name)}</strong><br><span class="muted">${text(s.email)}</span>`,
          s.status,
          Number(s.balance || 0) <= 2 ? `<span class="warn">${s.balance}</span>` : text(s.balance),
          text(s.mobile)
        ])).join('') || row(['No students yet.', '', '', '']);
        $('coursesBody').innerHTML = courses.courses.map((c) => row([text(c.name), text(c.credit_unit), text(c.default_credit_debit)])).join('') || row(['No courses yet.', '', '']);
        $('packagesBody').innerHTML = packages.packages.map((p) => row([text(p.name), text(p.credits), money(p.price_aud_cents)])).join('') || row(['No packages yet.', '', '']);
        $('registrationsBody').innerHTML = registrations.registrations.map((r) => row([`${text(r.first_name)} ${text(r.last_name)}`, r.status, text(r.mobile || r.email)])).join('') || row(['No pending registrations.', '', '']);
        $('portfolioBody').innerHTML = portfolio.portfolio.map((p) => row([text(p.student_name), text(p.title), text(p.visibility), text(p.storage_key)])).join('') || row(['No portfolio items yet.', '', '', '']);
      } catch (err) {
        $('errorBox').textContent = err.message;
        $('errorBox').hidden = false;
      }
    }
    $('tenantSlug').value = localStorage.getItem('studiosaas_tenant_slug') || $('tenantSlug').value;
    $('refreshBtn').addEventListener('click', refresh);
    refresh();
  </script>
</body>
</html>
