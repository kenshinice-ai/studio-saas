<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioSaaS Super Admin</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f8fb; color: #172033; }
    main { max-width: 1040px; margin: 0 auto; padding: 32px 20px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin: 0; }
    .layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
    nav, section { background: #fff; border: 1px solid #dfe4ee; border-radius: 8px; padding: 18px; }
    button { background: #1f6feb; color: #fff; border: 0; border-radius: 6px; padding: 10px 14px; font-size: 15px; }
    .row { display: grid; grid-template-columns: 1.6fr .8fr .8fr .8fr; gap: 12px; padding: 12px 0; border-bottom: 1px solid #edf0f5; }
    .muted { color: #64748b; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>StudioSaaS Super Admin</h1>
      <button>Create Studio</button>
    </header>
    <div class="layout">
      <nav>
        <p>Workspaces</p>
        <p class="muted">Plans</p>
        <p class="muted">Billing</p>
        <p class="muted">Usage</p>
        <p class="muted">Audit Logs</p>
      </nav>
      <section>
        <div class="row muted"><strong>Studio</strong><strong>Status</strong><strong>Plan</strong><strong>Students</strong></div>
        <div class="row"><span>Let's Paint Studio</span><span>trial</span><span>Studio</span><span>-</span></div>
      </section>
    </div>
  </main>
</body>
</html>
