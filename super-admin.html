<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioSaaS Super Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg:#f5f3ff; --surface:#ffffff; --ink:#1f1b3d; --muted:#6b6685;
      --line:#ddd6fe; --brand:#312e81; --brand-2:#6366f1;
      --soft:#eef2ff; --green:#0f8a5f; --red:#b42318; --amber:#b54708;
    }
    * { box-sizing: border-box; }
    body { margin:0; background:linear-gradient(180deg,#f5f3ff 0,#f8fafc 46%); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { max-width:1280px; margin:0 auto; padding:28px 22px 46px; }
    header { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:22px; }
    h1 { margin:0 0 6px; font-size:30px; letter-spacing:0; }
    h2 { margin:0 0 14px; font-size:18px; }
    input, select, button, textarea { font:inherit; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:7px; padding:10px 11px; background:#fff; }
    textarea { min-height:72px; resize:vertical; }
    button { border:0; border-radius:7px; padding:10px 13px; background:var(--brand); color:#fff; cursor:pointer; font-weight:700; }
    button:hover { background:#242064; }
    button.secondary { background:var(--soft); color:var(--brand); }
    button.danger { background:#fee4e2; color:var(--red); }
    label { display:block; color:var(--muted); font-size:12px; margin-bottom:5px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:11px 10px; border-bottom:1px solid #edf1f6; text-align:left; vertical-align:top; }
    th { color:var(--muted); font-size:12px; font-weight:800; background:#fbfcff; }
    code { background:var(--soft); color:var(--brand); padding:2px 5px; border-radius:4px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand img { width:54px; height:54px; object-fit:contain; border-radius:12px; background:#fff; border:1px solid var(--line); padding:6px; }
    .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .panel { background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:18px; box-shadow:0 10px 30px rgba(49,46,129,.08); }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:18px; }
    .two { display:grid; grid-template-columns:1.15fr .85fr; gap:18px; align-items:start; }
    .form-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
    .metric { font-size:30px; font-weight:850; }
    .muted { color:var(--muted); }
    .pill { display:inline-block; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:800; background:#ecfdf3; color:var(--green); }
    .pill.warn { background:#fff7ed; color:var(--amber); }
    .pill.red { background:#fee4e2; color:var(--red); }
    .actions { display:flex; gap:7px; flex-wrap:wrap; }
    .error { border-color:#f2b8b5; background:#fff8f7; color:#9f1c12; }
    .success { border-color:#abefc6; background:#f6fef9; color:#067647; }
    @media (max-width:960px) { header,.two { display:block; } .grid,.form-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:620px) { .grid,.form-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <img src="/logo.png" alt="StudioSaaS">
        <div>
          <h1>StudioSaaS</h1>
          <div class="muted">Super Admin dashboard for tenant operations, plans, billing periods, and audit activity.</div>
        </div>
      </div>
      <div class="toolbar">
        <input id="baseUrl" aria-label="API base URL" value="/v1" style="width:180px">
        <button id="refreshBtn">Refresh</button>
      </div>
    </header>

    <section id="messageBox" class="panel" hidden></section>

    <section class="grid">
      <div class="panel"><div id="tenantCount" class="metric">-</div><div class="muted">Tenants</div></div>
      <div class="panel"><div id="studentCount" class="metric">-</div><div class="muted">Students</div></div>
      <div class="panel"><div id="portfolioCount" class="metric">-</div><div class="muted">Portfolio Items</div></div>
      <div class="panel"><div id="storageCount" class="metric">-</div><div class="muted">Storage MB</div></div>
    </section>

    <div class="two">
      <section class="panel">
        <h2>Tenants</h2>
        <table>
          <thead>
            <tr><th>Studio</th><th>Status</th><th>Plan</th><th>Subscription</th><th>Usage</th><th>Actions</th></tr>
          </thead>
          <tbody id="tenantsBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2 id="tenantFormTitle">Add Tenant</h2>
        <div class="form-grid">
          <div><label>Name</label><input id="tenantName" placeholder="Let's Play Piano"></div>
          <div><label>Slug</label><input id="tenantSlug" placeholder="lets-play-piano"></div>
          <div><label>Status</label><select id="tenantStatus"><option>trial</option><option>active</option><option>past_due</option><option>paused</option><option>cancelled</option></select></div>
          <div><label>Plan</label><select id="tenantPlan"></select></div>
          <div><label>Subscription Status</label><select id="subscriptionStatus"><option>trialing</option><option>active</option><option>past_due</option><option>paused</option><option>cancelled</option></select></div>
          <div><label>Starts At</label><input id="startsAt" type="date"></div>
          <div><label>Ends At</label><input id="endsAt" type="date"></div>
          <div><label>Current Period Ends</label><input id="currentPeriodEndsAt" type="date"></div>
        </div>
        <div class="toolbar" style="margin-top:14px">
          <button id="saveTenantBtn">Save Tenant</button>
          <button id="resetTenantBtn" class="secondary">New Tenant</button>
        </div>
      </section>
    </div>

    <div class="two">
      <section class="panel">
        <h2>Plans</h2>
        <table>
          <thead><tr><th>Plan</th><th>Monthly</th><th>Limits</th><th>Actions</th></tr></thead>
          <tbody id="plansBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2 id="planFormTitle">Add Plan</h2>
        <div class="form-grid">
          <div><label>Code</label><input id="planCode" placeholder="studio-plus"></div>
          <div><label>Name</label><input id="planName" placeholder="Studio Plus"></div>
          <div><label>Monthly AUD</label><input id="planMonthly" type="number" min="0" value="149"></div>
          <div><label>Students</label><input id="planStudents" type="number" min="1" value="800"></div>
          <div><label>Users</label><input id="planUsers" type="number" min="1" value="12"></div>
          <div><label>Storage MB</label><input id="planStorage" type="number" min="1" value="51200"></div>
        </div>
        <label style="margin-top:12px">Features JSON</label>
        <textarea id="planFeatures">{"public_registration":true,"portfolio":true}</textarea>
        <div class="toolbar" style="margin-top:14px">
          <button id="savePlanBtn">Save Plan</button>
          <button id="resetPlanBtn" class="secondary">New Plan</button>
        </div>
      </section>
    </div>

    <section class="panel">
      <h2>Audit Logs</h2>
      <table>
        <thead><tr><th>Time</th><th>Tenant</th><th>Action</th><th>Resource</th></tr></thead>
        <tbody id="auditBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let tenants = [];
    let plans = [];
    let editingTenantId = '';
    let editingPlanCode = '';
    const text = (value) => value === null || value === undefined || value === '' ? '-' : value;
    const dateOnly = (value) => value ? String(value).slice(0, 10) : '';
    const money = (value) => `AUD ${Number(value || 0)}`;
    function show(message, type = 'success') {
      $('messageBox').className = `panel ${type === 'error' ? 'error' : 'success'}`;
      $('messageBox').textContent = message;
      $('messageBox').hidden = false;
    }
    async function api(path, options = {}) {
      const base = $('baseUrl').value.replace(/\/$/, '');
      const res = await fetch(base + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.error || `${res.status} ${path}`);
      return data;
    }
    function row(cells) { return `<tr>${cells.map((c) => `<td>${c}</td>`).join('')}</tr>`; }
    function pill(value) {
      const cls = value === 'active' || value === 'trialing' || value === 'trial' ? 'pill' : value === 'past_due' ? 'pill warn' : 'pill red';
      return `<span class="${cls}">${text(value)}</span>`;
    }
    function fillPlanSelect() {
      $('tenantPlan').innerHTML = plans.map((p) => `<option value="${p.code}">${p.name} (${p.code})</option>`).join('');
    }
    function resetTenantForm() {
      editingTenantId = '';
      $('tenantFormTitle').textContent = 'Add Tenant';
      ['tenantName','tenantSlug','startsAt','endsAt','currentPeriodEndsAt'].forEach((id) => $(id).value = '');
      $('tenantSlug').disabled = false;
      $('tenantStatus').value = 'trial';
      $('subscriptionStatus').value = 'trialing';
      if (plans[0]) $('tenantPlan').value = plans[0].code;
    }
    function editTenant(id) {
      const t = tenants.find((item) => item.id === id);
      if (!t) return;
      editingTenantId = id;
      $('tenantFormTitle').textContent = `Edit ${t.name}`;
      $('tenantName').value = t.name;
      $('tenantSlug').value = t.slug;
      $('tenantSlug').disabled = true;
      $('tenantStatus').value = t.status;
      $('tenantPlan').value = t.plan_code;
      $('subscriptionStatus').value = t.subscription_status || 'trialing';
      $('startsAt').value = dateOnly(t.starts_at);
      $('endsAt').value = dateOnly(t.ends_at);
      $('currentPeriodEndsAt').value = dateOnly(t.current_period_ends_at);
    }
    async function saveTenant() {
      const payload = {
        name: $('tenantName').value,
        slug: $('tenantSlug').value,
        status: $('tenantStatus').value,
        planCode: $('tenantPlan').value,
        subscriptionStatus: $('subscriptionStatus').value,
        startsAt: $('startsAt').value || null,
        endsAt: $('endsAt').value || null,
        currentPeriodEndsAt: $('currentPeriodEndsAt').value || null
      };
      await api(editingTenantId ? `/admin/tenants/${editingTenantId}` : '/admin/tenants', {
        method: editingTenantId ? 'PATCH' : 'POST',
        body: JSON.stringify(payload)
      });
      show(editingTenantId ? 'Tenant updated.' : 'Tenant created.');
      resetTenantForm();
      await refresh();
    }
    async function deleteTenant(id, name) {
      if (!confirm(`Delete tenant "${name}" and its tenant-owned data?`)) return;
      await api(`/admin/tenants/${id}`, { method: 'DELETE' });
      show('Tenant deleted.');
      await refresh();
    }
    function resetPlanForm() {
      editingPlanCode = '';
      $('planFormTitle').textContent = 'Add Plan';
      $('planCode').disabled = false;
      $('planCode').value = '';
      $('planName').value = '';
      $('planMonthly').value = 149;
      $('planStudents').value = 800;
      $('planUsers').value = 12;
      $('planStorage').value = 51200;
      $('planFeatures').value = '{"public_registration":true,"portfolio":true}';
    }
    function editPlan(code) {
      const p = plans.find((item) => item.code === code);
      if (!p) return;
      editingPlanCode = code;
      $('planFormTitle').textContent = `Edit ${p.name}`;
      $('planCode').value = p.code;
      $('planCode').disabled = true;
      $('planName').value = p.name;
      $('planMonthly').value = p.monthly_price_aud;
      $('planStudents').value = p.student_limit;
      $('planUsers').value = p.user_limit;
      $('planStorage').value = p.storage_limit_mb;
      $('planFeatures').value = JSON.stringify(p.features || {}, null, 2);
    }
    async function savePlan() {
      let features;
      try { features = JSON.parse($('planFeatures').value || '{}'); }
      catch { show('Features must be valid JSON.', 'error'); return; }
      const payload = {
        code: $('planCode').value,
        name: $('planName').value,
        monthlyPriceAud: Number($('planMonthly').value),
        studentLimit: Number($('planStudents').value),
        userLimit: Number($('planUsers').value),
        storageLimitMb: Number($('planStorage').value),
        features
      };
      await api(editingPlanCode ? `/plans/${editingPlanCode}` : '/plans', {
        method: editingPlanCode ? 'PATCH' : 'POST',
        body: JSON.stringify(payload)
      });
      show(editingPlanCode ? 'Plan updated.' : 'Plan created.');
      resetPlanForm();
      await refresh();
    }
    async function deletePlan(code) {
      if (!confirm(`Delete plan "${code}"?`)) return;
      await api(`/plans/${code}`, { method: 'DELETE' });
      show('Plan deleted.');
      await refresh();
    }
    async function refresh() {
      $('messageBox').hidden = true;
      try {
        const [usage, planData, tenantData, audit] = await Promise.all([
          api('/admin/usage'), api('/plans'), api('/admin/tenants'), api('/admin/audit-logs')
        ]);
        plans = planData.plans;
        tenants = tenantData.tenants;
        fillPlanSelect();
        $('tenantCount').textContent = usage.usage.tenants;
        $('studentCount').textContent = usage.usage.students;
        $('portfolioCount').textContent = usage.usage.portfolio_items;
        $('storageCount').textContent = usage.usage.storage_used_mb;
        $('plansBody').innerHTML = plans.map((p) => row([
          `<strong>${text(p.name)}</strong><br><code>${p.code}</code>`,
          money(p.monthly_price_aud),
          `${p.student_limit} students<br>${p.user_limit} users<br>${p.storage_limit_mb} MB`,
          `<div class="actions"><button class="secondary" onclick="editPlan('${p.code}')">Edit</button><button class="danger" onclick="deletePlan('${p.code}')">Delete</button></div>`
        ])).join('') || row(['No plans.', '', '', '']);
        $('tenantsBody').innerHTML = tenants.map((t) => row([
          `<strong>${text(t.name)}</strong><br><code>${t.slug}</code><br><span class="muted">${text(t.workspace_path)}</span><br><a href="/${t.slug}">Open CMS</a>`,
          pill(t.status),
          `<strong>${t.plan_code}</strong>`,
          `${pill(t.subscription_status || '-')}<br><span class="muted">${dateOnly(t.starts_at) || '-'} to ${dateOnly(t.ends_at) || 'open'}</span>`,
          `${t.student_count} students<br>${t.storage_used_mb} MB`,
          `<div class="actions"><button class="secondary" onclick="editTenant('${t.id}')">Edit</button><button class="danger" onclick="deleteTenant('${t.id}', '${String(t.name).replace(/'/g, "\\'")}')">Delete</button></div>`
        ])).join('') || row(['No tenants.', '', '', '', '', '']);
        $('auditBody').innerHTML = audit.auditLogs.length ? audit.auditLogs.map((a) => row([
          text(a.created_at), text(a.tenant_slug), text(a.action), `${text(a.resource_type)} ${text(a.resource_id)}`
        ])).join('') : row(['No audit rows yet.', '', '', '']);
        if (!editingTenantId && plans[0]) $('tenantPlan').value = plans[0].code;
      } catch (err) {
        show(err.message, 'error');
      }
    }
    $('refreshBtn').addEventListener('click', refresh);
    $('saveTenantBtn').addEventListener('click', () => saveTenant().catch((err) => show(err.message, 'error')));
    $('resetTenantBtn').addEventListener('click', resetTenantForm);
    $('savePlanBtn').addEventListener('click', () => savePlan().catch((err) => show(err.message, 'error')));
    $('resetPlanBtn').addEventListener('click', resetPlanForm);
    refresh();
  </script>
</body>
</html>
