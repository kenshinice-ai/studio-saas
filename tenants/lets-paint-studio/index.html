<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let's Paint Studio</title>
  <script src="/assets/ui-common.js"></script>
  <style>
    :root{
      --primary:#1E40AF; --secondary:#0F766E;
      --bg:#F8FAFC; --surface:#FFFFFF; --text:#1E293B; --text-muted:#64748B;
      --border:#E2E8F0; --radius:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:Inter,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}
    a{color:var(--primary);}
    section{padding:48px 16px;}
    .wrap{max-width:960px;margin:0 auto;}
    .hidden{display:none !important;}

    /* Nav */
    nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;}
    nav .wrap{display:flex;align-items:center;gap:12px;}
    nav img{height:36px;width:36px;object-fit:contain;border-radius:8px;}
    nav .name{font-weight:700;flex:1;font-size:17px;}
    nav .cta{background:var(--primary);color:#fff;text-decoration:none;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600;}

    /* Hero */
    .hero{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;text-align:center;padding:72px 16px;}
    .hero img{height:88px;width:88px;object-fit:contain;border-radius:16px;background:rgba(255,255,255,.15);padding:8px;margin-bottom:16px;}
    .hero h1{font-size:clamp(28px,5vw,44px);font-weight:700;}
    .hero p{font-size:clamp(15px,2.5vw,19px);opacity:.92;margin:12px auto 28px;max-width:560px;}
    .hero .cta{display:inline-block;background:#fff;color:var(--primary);text-decoration:none;padding:14px 34px;border-radius:10px;font-weight:700;font-size:16px;}

    h2{font-size:24px;margin-bottom:20px;text-align:center;}
    .about p{max-width:640px;margin:0 auto;text-align:center;color:var(--text-muted);font-size:16px;}

    /* Programs */
    .programs{background:var(--surface);}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
    .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
    .card h3{font-size:17px;margin-bottom:6px;}
    .card .tagline{font-size:12px;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
    .card p{font-size:14px;color:var(--text-muted);}
    .card .meta{margin-top:12px;font-size:13px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap;}

    /* Contact */
    .contact .items{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;font-size:15px;}
    .contact .item{display:flex;align-items:center;gap:8px;color:var(--text-muted);text-decoration:none;}

    /* Footer CTA */
    .footer-cta{background:var(--surface);border-top:1px solid var(--border);text-align:center;}
    .footer-cta .cta{display:inline-block;background:var(--primary);color:#fff;text-decoration:none;padding:14px 34px;border-radius:10px;font-weight:700;font-size:16px;margin-top:8px;}
    footer{padding:20px;text-align:center;font-size:12px;color:var(--text-muted);}
  </style>
</head>
<body data-tenant-slug="lets-paint-studio">
  <nav>
    <div class="wrap">
      <img id="navLogo" alt="" class="hidden">
      <span class="name" id="navName">Let's Paint Studio</span>
      <a class="cta" href="/lets-paint-studio/register">Register</a>
    </div>
  </nav>

  <header class="hero">
    <img id="heroLogo" alt="" class="hidden">
    <h1 id="heroName">Let's Paint Studio</h1>
    <p id="heroSlogan" class="hidden"></p>
    <a class="cta" href="/lets-paint-studio/register">Register Now</a>
  </header>

  <section class="about hidden" id="aboutSection">
    <div class="wrap">
      <h2>Welcome</h2>
      <p id="aboutText"></p>
    </div>
  </section>

  <section class="programs hidden" id="programsSection">
    <div class="wrap">
      <h2>Our Programs</h2>
      <div class="grid" id="programsGrid"></div>
    </div>
  </section>

  <section class="contact hidden" id="contactSection">
    <div class="wrap">
      <h2>Contact Us</h2>
      <div class="items" id="contactItems"></div>
    </div>
  </section>

  <section class="footer-cta">
    <div class="wrap">
      <h2>Ready to join?</h2>
      <p style="color:var(--text-muted);">Tell us about your student — we'll be in touch.</p>
      <a class="cta" href="/lets-paint-studio/register">Register Now</a>
    </div>
  </section>

  <footer>Powered by StudioSaaS · <a href="/lets-paint-studio/studio-admin">Studio Admin</a></footer>

<script>
(function () {
  const slug = document.body.dataset.tenantSlug;
  const esc = window.StudioSaaS.esc;
  const $ = (id) => document.getElementById(id);
  const show = (id) => $(id).classList.remove('hidden');

  fetch(`/v1/public/${encodeURIComponent(slug)}/brand`)
    .then((res) => res.json())
    .then((data) => {
      const b = (data && data.brand) || {};
      if (b.primaryColor) document.documentElement.style.setProperty('--primary', b.primaryColor);
      if (b.secondaryColor) document.documentElement.style.setProperty('--secondary', b.secondaryColor);
      if (b.name) {
        document.title = b.name;
        $('navName').textContent = b.name;
        $('heroName').textContent = b.name;
      }
      if (b.logoUrl) {
        ['navLogo', 'heroLogo'].forEach((id) => { $(id).src = b.logoUrl; show(id); });
      }
      if (b.slogan) { $('heroSlogan').textContent = b.slogan; show('heroSlogan'); }
      if (b.showWelcome !== false && b.welcomeMessage) {
        $('aboutText').textContent = b.welcomeMessage;
        show('aboutSection');
      }
      const items = [];
      if (b.contactPhone) items.push(['📞', b.contactPhone, `tel:${b.contactPhone}`]);
      if (b.contactEmail) items.push(['✉️', b.contactEmail, `mailto:${b.contactEmail}`]);
      if (b.address) items.push(['📍', b.address, null]);
      if (items.length) {
        const box = $('contactItems');
        items.forEach(([icon, text, href]) => {
          const el = document.createElement(href ? 'a' : 'span');
          el.className = 'item';
          if (href) el.href = href;
          el.textContent = `${icon} ${text}`;
          box.appendChild(el);
        });
        show('contactSection');
      }
    })
    .catch(() => { /* static fallback already rendered */ });

  fetch(`/v1/public/${encodeURIComponent(slug)}/programs`)
    .then((res) => res.json())
    .then((data) => {
      const programs = (data && data.programs) || [];
      if (!programs.length) return;
      const grid = $('programsGrid');
      programs.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'card';
        const metaBits = [];
        if (p.ageRange) metaBits.push(`Ages ${p.ageRange}`);
        if (p.durationMinutes) metaBits.push(`${Number(p.durationMinutes)} min`);
        if (p.priceAud) metaBits.push(`$${Number(p.priceAud).toFixed(0)} AUD`);
        const taglineHtml = p.category ? `<div class="tagline">${esc(p.category)}</div>` : '';
        const metaHtml = metaBits.map((m) => `<span>${esc(m)}</span>`).join('');
        card.innerHTML = `
          ${/*safe*/taglineHtml}
          <h3>${esc(p.name)}</h3>
          <p>${esc(p.description)}</p>
          <div class="meta">${/*safe*/metaHtml}</div>`;
        grid.appendChild(card);
      });
      show('programsSection');
    })
    .catch(() => {});
})();
</script>
</body>
</html>
