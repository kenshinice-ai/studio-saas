<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance Dance CMS</title>
  <style>
    :root {
      --brand:#3b82f6;
      --brand-2:#2563eb;
      --bg:#f1f5f9;
      --surface:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --shadow-sm:0 1px 2px rgba(0,0,0,.04);
      --shadow-md:0 4px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      --radius:8px;
      --radius-lg:12px;
    }
    * { box-sizing:border-box; }
    html, body { width:100%; margin:0; color:var(--ink); background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; -webkit-font-smoothing:antialiased; }
    html, body, body.tenant-cms { height:100%; }
    body.tenant-cms { display:grid; grid-template-rows:auto auto 1fr; }
    body.tenant-register { min-height:100%; display:block; }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 24px; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); box-shadow:var(--shadow-sm); position:sticky; top:0; z-index:10; backdrop-filter:blur(10px); }
    body.layout-hero header { background:var(--brand); color:#fff; border-bottom:0; }
    body.layout-compact header { padding:8px 16px; }
    .brand { display:flex; align-items:center; gap:12px; min-width:0; }
    .brand img { width:42px; height:42px; object-fit:contain; border:1px solid var(--line); border-radius:var(--radius); background:#fff; padding:4px; box-shadow:var(--shadow-sm); flex-shrink:0; }
    .name { color:var(--ink); font-weight:800; font-size:15px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .slogan { color:var(--muted); font-size:12px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:min(56vw, 640px); }
    .contact { color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:min(56vw, 640px); }
    body.layout-hero .name, body.layout-hero a { color:#fff; }
    body.layout-hero .contact, body.layout-hero .slogan { color:rgba(255,255,255,.86); }
    a { display:inline-flex; align-items:center; justify-content:center; min-height:36px; padding:8px 14px; border-radius:var(--radius); background:#f8fafc; border:1px solid var(--line); color:var(--brand); font-size:13px; font-weight:800; text-decoration:none; box-shadow:var(--shadow-sm); transition:all .15s ease; white-space:nowrap; }
    a:hover { background:#eff6ff; border-color:#bfdbfe; transform:translateY(-1px); }
    body.layout-hero a { background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.24); color:#fff; }
    .welcome { display:none; padding:10px 24px; background:#fff; border-bottom:1px solid var(--line); color:#334155; font-size:14px; box-shadow:var(--shadow-sm); }
    body.show-welcome .welcome { display:block; }
    body.layout-hero .welcome { background:var(--brand); color:#fff; border-bottom:0; padding-top:0; box-shadow:none; }
    body.layout-compact .welcome { padding:6px 16px; font-size:13px; }
    iframe { width:100%; border:0; display:block; background:#fff; }
    body.tenant-cms iframe { height:100%; }
    body.tenant-register iframe { min-height:900px; }
    @media (max-width:720px) {
      header { align-items:flex-start; flex-direction:column; padding:12px 16px; gap:10px; }
      .brand { width:100%; align-items:flex-start; }
      .brand img { width:40px; height:40px; }
      .name, .slogan, .contact { max-width:calc(100vw - 92px); }
      .contact { display:none; }
      a { align-self:flex-start; min-height:34px; }
      .welcome { padding:9px 16px; }
    }
  </style>
</head>
<body class="tenant-cms">
  <header>
    <div class="brand">
      <img id="tenantLogo" src="/logo.png" alt="Dance Dance">
      <div>
	        <div id="tenantName" class="name">Dance Dance</div>
	        <div id="tenantSlogan" class="slogan"></div>
	        <div id="tenantContact" class="contact"></div>
      </div>
    </div>
    <a href="/dance-dance/register">Register</a>
  </header>
  <section id="tenantWelcome" class="welcome"></section>
  <iframe id="cmsFrame" title="Dance Dance CMS" src="/dance-dance/cms"></iframe>
  <script>
    const TENANT_SLUG = 'dance-dance';
    const TENANT_NAME = document.getElementById('tenantName').textContent || 'Studio';
    function applyPresentation(brand) {
      const layout = brand.cms_layout || brand.cmsLayout || 'bar';
      document.body.classList.remove('layout-bar', 'layout-hero', 'layout-compact', 'show-welcome');
      document.body.classList.add(`layout-${layout}`);
      const showWelcome = String(brand.show_welcome ?? brand.showWelcome ?? true) !== 'false';
      const welcome = brand.welcome_message || brand.welcomeMessage || '';
      document.getElementById('tenantWelcome').textContent = welcome;
      if (showWelcome && welcome) document.body.classList.add('show-welcome');
    }
    async function applyBrand() {
      const response = await fetch(`/v1/public/${TENANT_SLUG}/brand`).catch(() => null);
      if (!response || !response.ok) return;
      const data = await response.json();
      const brand = data.brand || {};
      document.title = `${brand.name || TENANT_NAME} CMS`;
      document.documentElement.style.setProperty('--brand', brand.primary_color || brand.primaryColor || '#312e81');
      document.documentElement.style.setProperty('--brand-2', brand.secondary_color || brand.secondaryColor || '#6366f1');
	      document.getElementById('tenantName').textContent = brand.name || TENANT_NAME;
	      document.getElementById('tenantSlogan').textContent = brand.slogan || '';
	      document.getElementById('tenantLogo').src = brand.logo_url || brand.logoUrl || '/logo.png';
      document.getElementById('tenantContact').textContent = [brand.contact_phone || brand.contactPhone, brand.contact_email || brand.contactEmail, brand.address].filter(Boolean).join(' · ');
      applyPresentation(brand);
    }
    applyBrand();
  </script>
</body>
</html>
