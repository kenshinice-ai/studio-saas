[pytest]
# test_cms.py and test_tenant_isolation.py in the backend root are
# script-style smoke tests (run with ``python test_cms.py``); they are kept
# out of collection by scoping testpaths to the tests/ package.
#
# Usage:  pytest -q            (runs backend/tests/)
#         python test_cms.py   (runs the smoke test directly)
testpaths =
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs =
    __pycache__
    .venv
    venv
    backups
    photos
    portfolio
    media
    static
    checkpoints
    vendor
