[pytest]
# Prevent script-style smoke tests from being collected as pytest modules.
# test_cms.py and test_tenant_isolation.py are designed to run as standalone
# scripts (``python test_cms.py``), not as pytest test collections.
#
# Usage:  pytest -q  (runs only actual pytest test modules)
#         python test_cms.py  (runs the smoke test directly)
norecursedirs =
    __pycache__
    .venv
    venv
    backups
    photos
    portfolio
    static/uploads
    checkpoints
    archive
testpaths =
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Ignore script-style smoke tests during collection
norecursedirs =
    __pycache__
    .venv
    venv
