<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password — StudioSaaS</title>
<style>
  :root{--primary:#1E40AF;--bg:#F8FAFC;--surface:#FFFFFF;--text:#1E293B;--text-muted:#64748B;--border:#E2E8F0;--error:#DC2626;--success:#16A34A;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Inter,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:32px;width:100%;max-width:420px;}
  h1{font-size:22px;font-weight:600;margin-bottom:8px;}
  p.sub{color:var(--text-muted);font-size:14px;margin-bottom:24px;}
  label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;}
  .field{position:relative;margin-bottom:16px;}
  input[type=password],input[type=text]{width:100%;padding:12px 44px 12px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;}
  input:focus{outline:2px solid var(--primary);outline-offset:2px;border-color:var(--primary);}
  .toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:6px;}
  button.primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;}
  button.primary:disabled{opacity:.5;cursor:not-allowed;}
  .msg{margin-top:16px;font-size:14px;padding:12px;border-radius:8px;display:none;}
  .msg.error{display:block;background:#FEF2F2;color:var(--error);border:1px solid #FECACA;}
  .msg.success{display:block;background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0;}
  .hint{font-size:12px;color:var(--text-muted);margin-top:6px;}
</style>
</head>
<body>
  <div class="card">
    <h1>Set your password</h1>
    <p class="sub">Choose a password for your StudioSaaS studio admin account.</p>
    <form id="form" novalidate>
      <div class="field">
        <label for="pw">New password</label>
        <input id="pw" type="password" autocomplete="new-password" minlength="8" required>
        <button type="button" class="toggle" data-for="pw">Show</button>
        <div class="hint">Minimum 8 characters.</div>
      </div>
      <div class="field">
        <label for="pw2">Confirm password</label>
        <input id="pw2" type="password" autocomplete="new-password" minlength="8" required>
        <button type="button" class="toggle" data-for="pw2">Show</button>
      </div>
      <button class="primary" id="submitBtn" type="submit">Set password</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>
<script>
(function(){
  const token = new URLSearchParams(location.search).get('token') || '';
  const form = document.getElementById('form');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  function show(kind, text){ msg.className = 'msg ' + kind; msg.textContent = text; }

  if (!token) { show('error', 'This link is missing its token. Ask your platform admin for a new link.'); form.style.display = 'none'; }

  document.querySelectorAll('.toggle').forEach((t) => {
    t.addEventListener('click', () => {
      const input = document.getElementById(t.dataset.for);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      t.textContent = showing ? 'Show' : 'Hide';
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw.length < 8) return show('error', 'Password must be at least 8 characters.');
    if (pw !== pw2) return show('error', 'Passwords do not match.');
    btn.disabled = true; btn.textContent = 'Setting password…';
    try {
      const res = await fetch('/v1/auth/setup-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'StudioSaaS' },
        body: JSON.stringify({ token, password: pw }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        form.style.display = 'none';
        show('success', 'Password set for ' + (data.email || 'your account') + '. You can now sign in from your studio admin page.');
      } else if (res.status === 429) {
        show('error', 'Too many attempts. Please wait a minute and try again.');
      } else {
        show('error', (data && data.message) || 'This link is invalid or has expired.');
      }
    } catch (err) {
      show('error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Set password';
    }
  });
})();
</script>
</body>
</html>
